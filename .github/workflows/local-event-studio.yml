name: Local Event Studio Branch

on:
  push:
    branches:
      - develop/surface-local-events-coverage
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  repository-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact branch commit
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install --upgrade "pytest>=8,<9" "pydantic>=2,<3"

      - name: Run repository validation
        id: validation
        continue-on-error: true
        env:
          ACCEPTANCE_ARTIFACT_DIR: /tmp/infoscreen-acceptance
        run: bash scripts/run_full_ci_tests.sh

      - name: Publish exact commit status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const passed = "${{ steps.validation.outcome }}" === "success";
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? "success" : "failure",
              context: "infoscreen/local-event-studio",
              description: passed ? "Repository validation passed" : "Repository validation failed",
            });

      - name: Upload acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infoscreen-acceptance-${{ github.sha }}
          path: /tmp/infoscreen-acceptance
          if-no-files-found: warn
          retention-days: 7

      - name: Fail workflow when validation failed
        if: steps.validation.outcome != 'success'
        run: exit 1
