name: Quality Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  docker-quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build CI image
        run: docker build -f ci/Dockerfile -t infoscreen-ci .

      - name: Run quality gate in Docker
        run: docker run --rm -v "$PWD:/repo" -w /repo infoscreen-ci bash ci/run_all.sh
