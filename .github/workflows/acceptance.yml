name: InfoScreen acceptance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install acceptance dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pydantic

      - name: Run full local closed-loop tests
        env:
          ACCEPTANCE_ARTIFACT_DIR: /tmp/infoscreen-acceptance
        run: bash scripts/run_full_ci_tests.sh

      - name: Upload acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infoscreen-acceptance
          path: /tmp/infoscreen-acceptance
          if-no-files-found: error
          retention-days: 14
