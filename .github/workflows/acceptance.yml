name: InfoScreen acceptance

on:
  push:
    branches: [main, ci/local-events-acm-membership-1a3c54]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install acceptance dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pydantic

      - name: Run full local closed-loop tests
        env:
          ACCEPTANCE_ARTIFACT_DIR: /tmp/infoscreen-acceptance
        run: bash scripts/run_full_ci_tests.sh
